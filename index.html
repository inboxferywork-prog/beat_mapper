<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beat Mapper Ajaib!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>

@font-face {
  font-family: 'Bravura';
  src: url('./assets/fonts/Bravura.woff') format('woff'),
       url('./assets/fonts/Bravura.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root {
  --pink:    #FF6B9D;
  --orange:  #FF9F43;
  --yellow:  #FFD93D;
  --green:   #6BCB77;
  --blue:    #4D96FF;
  --purple:  #C77DFF;
  --red:     #FF6B6B;
  --teal:    #48CAE4;
  --bg:      #FFF9F0;
  --text:    #3D2B1F;
  --muted:   #8B7B74;
  --shadow:  rgba(61,43,31,0.12);
  --neon-pink:   #FF4FB3;
  --neon-orange: #FF8C2B;
  --neon-yellow: #FFE44D;
  --neon-lime:   #8DFF5B;
  --neon-blue:   #39B8FF;
  --neon-cyan:   #45F0FF;
  --neon-violet: #C95CFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden; /* no body scroll; all scroll inside outputContainer */
}

body {
  font-family: 'Baloo 2', cursive;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  /* mobile: fill exactly the viewport */
  min-height: 100vh;
  min-height: 100svh;
  min-height: 100dvh;
  height: 100vh;
  height: 100svh;
  height: 100dvh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,107,157,0.07) 1px, transparent 1px),
    radial-gradient(circle, rgba(77,150,255,0.05) 1px, transparent 1px);
  background-size: 42px 42px, 65px 65px;
  background-position: 0 0, 22px 32px;
  pointer-events: none;
  z-index: 0;
}

/* ====== HEADER ====== */
#header {
  background: white;
  z-index: 100;
  padding: 8px 12px 6px;
  box-shadow: 0 4px 18px var(--shadow);
  border-bottom: 3px solid var(--yellow);
  flex-shrink: 0;
}

#header h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow), var(--green), var(--blue), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 300% 300%;
  animation: rainbowShift 4s ease-in-out infinite;
}

@keyframes rainbowShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ====== TRANSPORT ROW ====== */
#transport {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.ts-select {
  font-family: 'Baloo 2', cursive;
  font-size: 14px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 50px;
  border: 2px solid var(--purple);
  background: #FAF0FF;
  color: var(--purple);
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}

.ctrl-btn {
  font-size: 17px;
  font-weight: 800;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 0 rgba(0,0,0,0.18);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.ctrl-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }

#playBtn { background: var(--green);  color: white; }
#stopBtn { background: var(--red);    color: white; }
#undoBtn { background: var(--orange); color: white; font-size:15px; }

#resetBtn {
  font-family: 'Baloo 2', cursive;
  font-size: 13px;
  font-weight: 800;
  padding: 6px 13px;
  border-radius: 50px;
  border: 2px solid var(--red);
  background: white;
  color: var(--red);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#resetBtn:active { background: var(--red); color: white; transform: scale(0.95); }

/* ====== TEMPO + TIMESIG ROW ====== */
#tempoRow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-bottom: 2px;
  flex-wrap: wrap;
}

.tempo-select {
  font-family: 'Baloo 2', cursive;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 50px;
  border: 2px solid var(--orange);
  background: #FFF8F0;
  color: var(--orange);
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}

#tempoDisplay {
  background: var(--yellow);
  color: var(--text);
  font-weight: 900;
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 30px;
  min-width: 64px;
  text-align: center;
}

/* ====== HORIZONTAL SCROLL NOTE BAR ====== */
#noteBar {
  position: relative;
  z-index: 1;
  padding: 8px 10px 6px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,249,240,0.96)),
    radial-gradient(circle at top left, rgba(255,79,179,0.12), transparent 35%),
    radial-gradient(circle at top right, rgba(57,184,255,0.12), transparent 35%);
  flex-shrink: 0;
}

#noteBar::before,
#noteBar::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 22px;
  z-index: 2;
  pointer-events: none;
}
#noteBar::before { left:  0; background: linear-gradient(to right, var(--bg), transparent); }
#noteBar::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }

.note-scroll-track {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: visible;
  padding: 10px 20px 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  align-items: stretch;
}
.note-scroll-track::-webkit-scrollbar { display: none; }

.note-help {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 0 12px 4px;
  padding: 8px 14px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,242,194,0.92));
  border: 2px solid rgba(255,217,61,0.7);
  box-shadow: 0 6px 16px rgba(255,217,61,0.18);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 900;
  color: #6B5200;
  text-align: center;
}

.note-help strong {
  color: #FF4FB3;
  font-weight: 900;
}

.scroll-divider {
  width: 2px;
  min-width: 2px;
  height: 44px;
  background: rgba(0,0,0,0.1);
  border-radius: 2px;
  flex-shrink: 0;
}

.note-btn {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  border: none;
  border-radius: 22px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  transition: transform .12s, box-shadow .12s, filter .12s;
  position: relative;
  padding: 10px 8px 8px;
  width: 92px;
  min-width: 92px;
  height: 118px;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: 3px solid rgba(255,255,255,0.78);
  overflow: hidden;
}
.note-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.38), transparent 32%),
    radial-gradient(circle at top center, rgba(255,255,255,0.28), transparent 48%);
  pointer-events: none;
}
.note-btn:active {
  transform: translateY(2px) scale(0.96);
  filter: saturate(1.05);
}

.note-btn .sym {
  line-height: 1;
  display: inline-flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 60px;
  margin-top: 12px;
  margin-bottom: -4px;
  z-index: 1;
  flex: 0 0 auto;
}

/* Beat count shown below the music symbol */
.beat-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 26px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 900;
  color: #2D160E;
  line-height: 1;
  margin-top: 0;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  letter-spacing: 0.01em;
  background: rgba(255,255,255,0.84);
  box-shadow: inset 0 -2px 0 rgba(255,255,255,0.32);
  z-index: 1;
}

.note-icon {
  width: 42px;
  height: 42px;
  display: block;
  color: #1A1A1A; /* Always dark/black — not inherited from button color */
}

.note-icon svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

.note-icon.smufl-glyph {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bravura', serif;
  font-size: 56px;
  line-height: 1;
}

.note-icon.smufl-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  overflow: visible;
}

.note-icon.smufl-wrap .smufl-glyph {
  font-family: 'Bravura', serif;
  line-height: 1;
}

.note-icon.smufl-wrap .smufl-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  right: 2px;
  top: 52%;
  transform: translateY(-50%);
}

.nb-whole .note-icon.smufl-glyph {
  font-size: 48px;
  transform: translateY(6px);
}

.nb-half .note-icon.smufl-glyph,
.nb-quarter .note-icon.smufl-glyph,
.nb-eighth .note-icon.smufl-glyph {
  font-size: 54px;
  transform: translateY(6px);
}

.nb-dotted-half .note-icon.smufl-wrap,
.nb-dotq .note-icon.smufl-wrap {
  transform: translate(-2px, 6px);
}

.nb-dotted-half .note-icon.smufl-wrap .smufl-glyph,
.nb-dotq .note-icon.smufl-wrap .smufl-glyph {
  font-size: 54px;
}

.nb-dotted-half .note-icon.smufl-wrap .smufl-dot,
.nb-dotq .note-icon.smufl-wrap .smufl-dot {
  width: 6px;
  height: 6px;
  right: 1px;
  top: 52%;
}

.nb-rest-h .note-icon.smufl-glyph,
.nb-rest-q .note-icon.smufl-glyph,
.nb-rest-e .note-icon.smufl-glyph {
  color: #2A2A2A !important;
}

.nb-rest-h .note-icon,
.nb-rest-q .note-icon,
.nb-rest-e .note-icon {
  transform: translateY(2px);
}

.nb-rest-h .note-icon.smufl-glyph {
  font-size: 46px;
}

.nb-rest-q .note-icon.smufl-glyph {
  font-size: 52px;
}

.nb-rest-e .note-icon.smufl-glyph {
  font-size: 54px;
}

.nb-eighth-front .note-icon {
  width: 38px;
  height: 38px;
  transform: translateY(0);
}

.nb-eighth-mid .note-icon {
  width: 38px;
  height: 38px;
  transform: translateY(1px);
}

.nb-eighth-back .note-icon {
  width: 38px;
  height: 38px;
  transform: translateY(1px);
}

/* Force icon color to black on ALL colored note buttons */
.note-btn .note-icon,
.note-btn .sym .note-icon {
  color: #1A1A1A !important;
}

/* Rest buttons: slightly softer dark for grey background */
.nb-rest-h .note-icon,
.nb-rest-q .note-icon,
.nb-rest-e .note-icon {
  color: #2A2A2A !important;
}

/* Whole note & half note inner holes must match their button background */
.nb-whole       { background: linear-gradient(180deg, #FF88CA, var(--neon-pink)); color: white; box-shadow: 0 6px 0 #D52C88, 0 10px 18px rgba(255,79,179,0.35); --notebg: var(--neon-pink); }
.nb-half        { background: linear-gradient(180deg, #FFBA68, var(--neon-orange)); color: white; box-shadow: 0 6px 0 #D26800, 0 10px 18px rgba(255,140,43,0.34); --notebg: var(--neon-orange); }
.nb-dotted-half { background: linear-gradient(180deg, #FFF07D, var(--neon-yellow)); color: #5F4800; box-shadow: 0 6px 0 #C8A400, 0 10px 18px rgba(255,228,77,0.34); --notebg: var(--neon-yellow); }
.nb-quarter     { background: linear-gradient(180deg, #A6FF84, var(--neon-lime)); color: #204300; box-shadow: 0 6px 0 #53AF1D, 0 10px 18px rgba(141,255,91,0.32); }
.nb-dotq        { background: linear-gradient(180deg, #7BC8FF, var(--neon-blue)); color: white; box-shadow: 0 6px 0 #157FD6, 0 10px 18px rgba(57,184,255,0.34); }
.nb-eighth      { background: linear-gradient(180deg, #E08EFF, var(--neon-violet)); color: white; box-shadow: 0 6px 0 #8E28D6, 0 10px 18px rgba(201,92,255,0.36); }
.nb-rest-h      { background: linear-gradient(180deg, #F7F7F7, #CFCFCF); color: #3F3F3F; box-shadow: 0 6px 0 #989898, 0 10px 18px rgba(160,160,160,0.28); }
.nb-rest-q      { background: linear-gradient(180deg, #EFEFEF, #BCBCBC); color: #3F3F3F; box-shadow: 0 6px 0 #858585, 0 10px 18px rgba(150,150,150,0.28); }
.nb-rest-e      { background: linear-gradient(180deg, #E7E7E7, #ABABAB); color: #3F3F3F; box-shadow: 0 6px 0 #767676, 0 10px 18px rgba(140,140,140,0.28); }
.nb-eighth-front { background: linear-gradient(180deg, #80F6FF, var(--neon-cyan)); color: #003F4A; box-shadow: 0 6px 0 #00A6B4, 0 10px 18px rgba(69,240,255,0.35); }
.nb-eighth-mid   { background: linear-gradient(180deg, #8DFFC9, #37D986); color: #0F4D2A; box-shadow: 0 6px 0 #1E9558, 0 10px 18px rgba(55,217,134,0.35); }
.nb-eighth-back  { background: linear-gradient(180deg, #FFB08B, #FF7C4A); color: white; box-shadow: 0 6px 0 #CF4D18, 0 10px 18px rgba(255,124,74,0.35); }

/* The inner "hole" ellipses of whole/half noteheads use the button's own bg color */
.nb-whole .notehead-hole,
.nb-half .notehead-hole,
.nb-dotted-half .notehead-hole { fill: var(--notebg, white); }

/* In output cells, hole color = white (cells have light tinted bg) */
.note-cell .notehead-hole { fill: white; }

/* quaver variant label colors — beat-count CSS handles the text */
.nb-eighth-front .beat-count,
.nb-eighth-mid .beat-count,
.nb-eighth-back .beat-count {
  color: #1A1A1A;
}

.nb-eighth-front .note-icon,
.nb-eighth-mid .note-icon,
.nb-eighth-back .note-icon {
  width: 38px;
  height: 38px;
}

/* Position sub-label (depan/tengah/blkg) under quaver variants */
.pos-label {
  display: block;
  font-size: 10px;
  font-weight: 800;
  color: rgba(255,255,255,0.92);
  line-height: 1;
  margin-top: 3px;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  letter-spacing: 0.03em;
  z-index: 1;
}

#tieBtn {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 16px;
  padding: 12px 16px;
  min-height: 64px;
  border-radius: 20px;
  border: 3px solid var(--teal);
  background: linear-gradient(180deg, white, #EFFFFC);
  color: #008CA6;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
  white-space: nowrap;
  box-shadow: 0 6px 0 rgba(72,202,228,0.4);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#tieBtn.active {
  background: linear-gradient(180deg, #8EF3FF, var(--teal));
  color: white;
}
#tieBtn:active { transform: translateY(1px); }

.note-btn:focus-visible,
#tieBtn:focus-visible,
.ctrl-btn:focus-visible,
#resetBtn:focus-visible,
.ts-select:focus-visible,
.tempo-select:focus-visible {
  outline: 4px solid rgba(255,228,77,0.85);
  outline-offset: 2px;
}

@media (max-width: 640px) {
  .note-btn {
    width: 84px;
    min-width: 84px;
    height: 110px;
    padding: 9px 7px 8px;
  }

  .note-btn .sym {
    min-height: 56px;
    margin-top: 10px;
    margin-bottom: -4px;
    flex: 0 0 auto;
  }

  .beat-count {
    font-size: 14px;
    min-height: 24px;
    margin-top: 0;
  }

  .note-icon {
    width: 38px;
    height: 38px;
  }

  .nb-eighth-front .note-icon {
    width: 36px;
    height: 36px;
    transform: translateY(0);
  }

  .nb-eighth-mid .note-icon {
    width: 36px;
    height: 36px;
    transform: translateY(1px);
  }

  .nb-eighth-back .note-icon {
    width: 36px;
    height: 36px;
    transform: translateY(1px);
  }
}

/* ====== OUTPUT AREA â€” fills remaining height ====== */
#outputWrapper {
  position: relative;
  margin: 4px 10px calc(10px + env(safe-area-inset-bottom, 0px));
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 28px var(--shadow);
  border: 3px solid rgba(0,0,0,0.05);
  z-index: 1;
  flex: 1;          /* grow to fill remaining vertical space */
  min-height: 0;    /* critical for flex children to scroll properly */
}

#outputContainer {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  background: white;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scroll-padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));
}

#outputContainer::-webkit-scrollbar { width: 5px; }
#outputContainer::-webkit-scrollbar-track { background: #f5f5f5; }
#outputContainer::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

/* COUNT IN OVERLAY */
#countOverlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  background: rgba(255,255,255,0.96);
  z-index: 20;
}

#countNumber {
  font-size: 90px;
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: countPop .2s ease;
}
@keyframes countPop {
  0%   { transform: scale(0.5); opacity: 0; }
  70%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
#countOverlay .count-sub {
  font-size: 16px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 4px;
}

#output {
  padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));
}

/* EMPTY STATE */
#emptyState {
  padding: 40px 20px;
  text-align: center;
}
#emptyState .empty-icon { margin: 0 auto 10px; animation: float 3s ease-in-out infinite; }
.piano-icon { width: 72px; height: 72px; }
.piano-icon svg { width: 100%; height: 100%; display: block; }
#emptyState p { font-size: 16px; font-weight: 700; color: var(--muted); }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

/* ====== BARS ====== */
.bar {
  padding: 10px 14px 8px;
  border-bottom: 2px dashed #F0EBE3;
}
.bar:last-child { border-bottom: none; }

.bar-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.bar-pill {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: white;
}
.bar-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(to right, rgba(199,125,255,0.25), transparent);
  border-radius: 2px;
}

.beat-row, .note-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 3px;
}

.beat-label {
  width: 40px;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 11px;
  color: var(--muted);
}

.note-cell {
  width: 40px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  position: relative;
  transition: background .15s, box-shadow .15s;
}
.note-cell .cell-sym {
  line-height: 1;
  display: inline-flex;
  align-items: flex-end;
  justify-content: center;
  width: 34px;
  height: 36px;
}

.note-cell .cell-sym .note-icon {
  width: 34px;
  height: 36px;
  color: #4A3528;
}

.note-cell .cell-sym .note-icon.smufl-glyph {
  width: 34px;
  height: 36px;
  font-size: 46px;
  display: inline-flex;
  align-items: flex-end;
  justify-content: center;
}

.note-cell .cell-sym .note-icon.smufl-wrap {
  width: 34px;
  height: 36px;
  transform: none;
}

.note-cell .cell-sym .note-icon.smufl-wrap .smufl-glyph {
  font-size: 46px;
}

.note-cell .cell-sym .note-icon.smufl-wrap .smufl-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: currentColor;
  right: 2px;
  top: 57%;
  transform: translateY(-50%);
}

.note-cell .cell-sym .note-icon.smufl-glyph.note-whole-glyph {
  font-size: 39px;
  transform: translateY(1px);
}

.note-cell .cell-sym .note-icon.smufl-glyph.note-half-glyph,
.note-cell .cell-sym .note-icon.smufl-glyph.note-quarter-glyph,
.note-cell .cell-sym .note-icon.smufl-glyph.note-eighth-glyph {
  font-size: 46px;
  transform: translateY(2px);
}

.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-half-glyph,
.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-quarter-glyph {
  width: 34px;
}

.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-half-glyph .smufl-glyph,
.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-quarter-glyph .smufl-glyph {
  font-size: 46px;
  transform: translateY(2px);
}

.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-half-glyph .smufl-dot,
.note-cell .cell-sym .note-icon.smufl-wrap.note-dotted-quarter-glyph .smufl-dot {
  right: 0;
  top: 58%;
}

.note-cell .cell-sym .output-note-glyph {
  width: 34px;
  height: 36px;
  transform: translateY(1px);
}

.note-cell .cell-sym .output-note-glyph svg {
  width: 100%;
  height: 100%;
  display: block;
}

.note-cell .cell-sym.output-rest-glyph {
  width: 34px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #4A3528;
}

.note-cell .cell-sym.output-rest-quarter-glyph,
.note-cell .cell-sym.output-rest-eighth-glyph {
  font-family: 'Bravura', serif;
  font-size: 49px;
  line-height: 1;
}

.note-cell .cell-sym.output-rest-quarter-glyph {
  font-size: 40px;
  transform: translateY(5px);
}

.note-cell .cell-sym.output-rest-eighth-glyph {
  font-size: 46px;
  transform: translateY(4px);
}

.note-cell .cell-sym.output-rest-half-glyph {
  transform: translateY(3px);
}

.note-cell .cell-sym .beam-glyph {
  width: 32px;
  height: 34px;
  transform: translateY(2px);
}

.note-cell .cell-sym .beam-glyph svg {
  width: 100%;
  height: 100%;
  display: block;
}

.note-cell .cell-sym .note-icon.smufl-glyph.rest-half-glyph {
  font-size: 36px;
}

.note-cell .cell-sym .note-icon.smufl-glyph.rest-quarter-glyph {
  font-size: 44px;
}

.note-cell .cell-sym .note-icon.smufl-glyph.rest-eighth-glyph {
  font-size: 45px;
}

/* Tie tail â€” horizontal line extending right from a tied note */
.note-cell.has-tie-out::after {
  content: '';
  position: absolute;
  right: -7px;
  top: 50%;
  width: 12px;
  height: 3px;
  background: var(--muted);
  border-radius: 2px;
  transform: translateY(-50%);
}

/* Note that is the TIE-CONTINUATION (second note of a tie) â€” dimmed slightly */
.note-cell.is-tied-cont {
  opacity: 0.55;
}

/* Active during playback */
.note-cell.active-cell {
  background: var(--yellow) !important;
  box-shadow: 0 0 0 3px var(--orange), 0 4px 14px rgba(255,200,0,0.5) !important;
  animation: activeGlow .25s ease forwards;
}
@keyframes activeGlow {
  0%   { transform: scale(0.85); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1.0); }
}

/* ====== SPARKLE ====== */
@keyframes sparkleFly {
  0%   { opacity: 1; transform: scale(1) translateY(0); }
  100% { opacity: 0; transform: scale(0.4) translateY(-28px); }
}
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 18px;
  animation: sparkleFly .6s ease forwards;
  z-index: 999;
}

</style>
</head>
<body>

<!-- ====== HEADER ====== -->
<div id="header">
  <h1>Beat Mapper Ajaib!</h1>

  <div id="transport">
    <button id="playBtn" class="ctrl-btn" onclick="startPlayback()" title="Main!">&#9654;</button>
    <button id="stopBtn" class="ctrl-btn" onclick="stop()"          title="Stop">&#9632;</button>
    <button id="undoBtn" class="ctrl-btn" onclick="undo()"          title="Hapus terakhir">&#x232B;</button>
    <button id="resetBtn"                 onclick="resetAll()">Mulai Lagi</button>
  </div>

  <div id="tempoRow">
    <select id="timeSig" onchange="render()" class="ts-select">
      <option>4/4</option>
      <option>3/4</option>
      <option>2/4</option>
      <option>6/8</option>
      <option>2/2</option>
    </select>
    <select id="tempoSelect" onchange="updateTempo()" class="tempo-select">
      <option value="45">Grave (?=45)</option>
      <option value="56">Largo (?=56)</option>
      <option value="63">Larghetto (?=63)</option>
      <option value="69">Adagio (?=69)</option>
      <option value="84">Andante (?=84)</option>
      <option value="98">Andantino (?=98)</option>
      <option value="108">Moderato (?=108)</option>
      <option value="120" selected>Allegretto (?=120)</option>
      <option value="138">Allegro (?=138)</option>
      <option value="160">Vivace (?=160)</option>
    </select>
    <div id="tempoDisplay">120 BPM</div>
  </div>
</div>

<!-- ====== HORIZONTAL SCROLL NOTE BAR ====== -->
<div id="noteBar">
  <div class="note-help"><strong>Lihat buku musikmu</strong> lalu pilih simbol yang sama satu per satu.</div>
  <div class="note-scroll-track" id="noteTrack">

    <button class="note-btn nb-whole"        data-type="whole"          onclick="addNote('whole', this)"         title="Not Penuh (Semibreve)"></button>
    <button class="note-btn nb-dotted-half"  data-type="dotted_half"    onclick="addNote('dotted_half', this)"   title="Not Titik Setengah"></button>
    <button class="note-btn nb-half"         data-type="half"           onclick="addNote('half', this)"          title="Not Setengah (Minim)"></button>
    <button class="note-btn nb-dotq"         data-type="dotted_quarter" onclick="addNote('dotted_quarter', this)"title="Not Titik Seperempat"></button>
    <button class="note-btn nb-quarter"      data-type="quarter"        onclick="addNote('quarter', this)"       title="Not Seperempat (Crotchet)"></button>
    <button class="note-btn nb-eighth"       data-type="eighth"         onclick="addNote('eighth', this)"        title="Not Seperdelapan (Quaver)"></button>
    <button class="note-btn nb-eighth-front" data-type="eighth_front"   onclick="addNote('eighth_front', this)"  title="Quaver posisi depan"></button>
    <button class="note-btn nb-eighth-mid"   data-type="eighth_mid"     onclick="addNote('eighth_mid', this)"    title="Quaver posisi tengah"></button>
    <button class="note-btn nb-eighth-back"  data-type="eighth_back"    onclick="addNote('eighth_back', this)"   title="Quaver posisi belakang"></button>

    <div class="scroll-divider"></div>

    <button class="note-btn nb-rest-e" data-type="rest_e" onclick="addNote('rest_e', this)" title="Diam Seperdelapan (Quaver Rest)"></button>
    <button class="note-btn nb-rest-q" data-type="rest_q" onclick="addNote('rest_q', this)" title="Diam Seperempat (Crotchet Rest)"></button>
    <button class="note-btn nb-rest-h" data-type="rest_h" onclick="addNote('rest_h', this)" title="Diam Setengah (Minim Rest)"></button>

    <div class="scroll-divider"></div>

    <button id="tieBtn" onclick="toggleTie()">Tie OFF</button>

  </div>
</div>

<!-- ====== OUTPUT ====== -->
<div id="outputWrapper">
  <div id="outputContainer">
    <div id="countOverlay">
      <div id="countNumber">3</div>
      <div class="count-sub">SIAP...</div>
    </div>
    <div id="output">
      <div id="emptyState">
        <div class="empty-icon piano-icon" aria-hidden="true"><svg viewBox="0 0 96 96" fill="none"><rect x="12" y="20" width="72" height="54" rx="10" fill="#FFF7E8" stroke="#FF9F43" stroke-width="4"/><rect x="20" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="30" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="40" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="50" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="60" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="27" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/><rect x="47" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/><rect x="57" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/></svg></div>
        <p>Tekan not di atas untuk mulai!</p>
      </div>
    </div>
  </div>
</div>

<script>

/* ============================================================
   STATE
============================================================ */
let notes   = [];   // { type, tieNext }
let grid    = [];   // { label, noteIndex, isMain, isTiedCont }
let index   = 0;
let playing = false;
let tempo   = 120;
let timer   = null;
let tieMode = false;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function ensureAudioReady() {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}

function playInputFeedback(type) {
  ensureAudioReady();

  if (type.startsWith('rest_')) {
    beep('rest_cue');
    return;
  }

  const freqMap = {
    whole: 440,
    dotted_half: 520,
    half: 620,
    dotted_quarter: 740,
    quarter: 880,
    eighth: 1040,
    eighth_front: 1040,
    eighth_mid: 1040,
    eighth_back: 1040
  };

  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freqMap[type] || 880, now);
  osc.frequency.linearRampToValueAtTime((freqMap[type] || 880) * 1.08, now + 0.09);

  gain.gain.setValueAtTime(0.001, now);
  gain.gain.linearRampToValueAtTime(0.22, now + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.12);
}

/* ============================================================
   TEMPO
============================================================ */
function updateTempo() {
  const sel = document.getElementById('tempoSelect');
  tempo = parseInt(sel.value);
  document.getElementById('tempoDisplay').innerText = tempo + ' BPM';
}

/* ============================================================
   SPARKLE
============================================================ */
function spawnSparkle(btn) {
  const r = btn.getBoundingClientRect();
  const emojis = ['*', '+', 'o', '.'];
  for (let i = 0; i < 3; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    sp.style.left = (r.left + r.width/2 + (Math.random()-0.5)*34) + 'px';
    sp.style.top  = (r.top + r.height * Math.random() * 0.5) + 'px';
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 700);
  }
}

/* ============================================================
   ADD / UNDO / TIE / RESET
============================================================ */
function addNote(n, source) {
  playInputFeedback(n);
  if (tieMode && notes.length > 0) {
    notes[notes.length - 1].tieNext = true;
    tieMode = false;
    updateTieBtn();
  }
  notes.push({ type: n, tieNext: false });
  const targetBtn = source && source.currentTarget ? source.currentTarget : source;
  if (targetBtn && targetBtn.getBoundingClientRect) spawnSparkle(targetBtn);
  render();
  requestAnimationFrame(scrollToLastBar);
}

function undo() {
  if (notes.length === 0) return;
  // If previous note had tieNext, clear it
  if (notes.length >= 2) notes[notes.length-2].tieNext = false;
  notes.pop();
  render();
}

function toggleTie() {
  tieMode = !tieMode;
  updateTieBtn();
}
function updateTieBtn() {
  const btn = document.getElementById('tieBtn');
  btn.innerText = tieMode ? 'Tie ON' : 'Tie OFF';
  btn.classList.toggle('active', tieMode);
}

function resetAll() {
  notes   = [];
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
  index   = 0;
  tieMode = false;
  grid    = [];
  updateTieBtn();
  document.getElementById('outputContainer').scrollTop = 0;
  document.getElementById('output').innerHTML = `
    <div id="emptyState">
      ${getPianoIconMarkup()}
      <p>Tekan not di atas untuk mulai!</p>
    </div>`;
}

/* ============================================================
   DURATION
============================================================ */
function getDur(n) {
  return { whole:8, half:4, dotted_half:6, quarter:2, dotted_quarter:3, eighth:1,
           eighth_front:1, eighth_mid:1, eighth_back:1,
           rest_h:4, rest_q:2, rest_e:1 }[n];
}


function getPianoIconMarkup() {
  return `<div class="empty-icon piano-icon" aria-hidden="true"><svg viewBox="0 0 96 96" fill="none"><rect x="12" y="20" width="72" height="54" rx="10" fill="#FFF7E8" stroke="#FF9F43" stroke-width="4"/><rect x="20" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="30" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="40" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="50" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="60" y="28" width="10" height="38" rx="3" fill="#FFFFFF" stroke="#3D2B1F" stroke-width="2"/><rect x="27" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/><rect x="47" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/><rect x="57" y="28" width="8" height="22" rx="2" fill="#3D2B1F"/></svg></div>`;
}
/* ============================================================
   COLORS & SYMBOLS
============================================================ */
const noteColor = {
  whole:'#FF6B9D', half:'#FF9F43', dotted_half:'#FFD93D',
  quarter:'#6BCB77', dotted_quarter:'#4D96FF', eighth:'#9B4DCA',
  eighth_front:'#00B4D8', eighth_mid:'#52B788', eighth_back:'#F4845F',
  rest_h:'#C8C8C8', rest_q:'#B8B8B8', rest_e:'#A8A8A8'
};

const NOTE_META = {
  whole:          { beat: '4' },
  dotted_half:    { beat: '3' },
  half:           { beat: '2' },
  dotted_quarter: { beat: '1 1/2' },
  quarter:        { beat: '1' },
  eighth:         { beat: '1/2' },
  eighth_front:   { beat: '1/2' },
  eighth_mid:     { beat: '1/2' },
  eighth_back:    { beat: '1/2' },
  rest_h:         { beat: '2' },
  rest_q:         { beat: '1' },
  rest_e:         { beat: '1/2' }
};

function getSlotsPerBar(ts) {
  return ts === '6/8' ? 6 : ts === '3/4' ? 6 : ts === '2/4' ? 4 : ts === '2/2' ? 8 : 8;
}

function getGridLabel(ts, pos) {
  if (ts === '6/8') {
    const beat = Math.floor(pos / 3) + 1;
    const sub  = pos % 3;
    return sub === 0 ? String(beat) : sub === 1 ? 'la' : 'li';
  }
  return pos % 2 === 0 ? String(Math.floor(pos / 2) + 1) : '&';
}

function getNoteIconMarkup(type, extraClass = '') {
  const cls = extraClass ? `note-icon ${extraClass}` : 'note-icon';
  const isCellSym = extraClass.includes('cell-sym');

  // All SVG paths below are carefully modeled after standard music engraving
  // conventions (SMuFL / Bravura reference), drawn in a 100×140 viewBox for
  // consistent proportions, then scaled by the CSS .note-icon size.

  const outputIcons = {
    whole: `<span class="${cls} output-note-glyph output-whole-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="44" cy="110" rx="25" ry="16" transform="rotate(-18 44 110)" fill="none" stroke="currentColor" stroke-width="6"/></svg></span>`,
    half: `<span class="${cls} output-note-glyph output-half-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="none" stroke="currentColor" stroke-width="6"/><rect x="51" y="18" width="7" height="88" rx="3.5" fill="currentColor"/></svg></span>`,
    dotted_half: `<span class="${cls} output-note-glyph output-dotted-half-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="none" stroke="currentColor" stroke-width="6"/><rect x="51" y="18" width="7" height="88" rx="3.5" fill="currentColor"/><circle cx="74" cy="110" r="5.5" fill="currentColor"/></svg></span>`,
    quarter: `<span class="${cls} output-note-glyph output-quarter-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="currentColor"/><rect x="51" y="18" width="7" height="88" rx="3.5" fill="currentColor"/></svg></span>`,
    dotted_quarter: `<span class="${cls} output-note-glyph output-dotted-quarter-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="currentColor"/><rect x="51" y="18" width="7" height="88" rx="3.5" fill="currentColor"/><circle cx="74" cy="110" r="5.5" fill="currentColor"/></svg></span>`,
    eighth: `<span class="${cls} output-note-glyph output-eighth-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="currentColor"/><rect x="51" y="18" width="7" height="88" rx="3.5" fill="currentColor"/><path d="M54 20 C70 24 76 36 74 50 C72 61 66 67 61 73" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/></svg></span>`,
    eighth_front: `<span class="${cls} output-note-glyph output-beam-glyph output-beam-front" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="28" cy="110" rx="25" ry="16" transform="rotate(-18 28 110)" fill="currentColor"/><rect x="51" y="28" width="7" height="78" rx="3.5" fill="currentColor"/><polygon points="55,31 82,27 82,38 55,43" fill="currentColor"/></svg></span>`,
    eighth_mid: `<span class="${cls} output-note-glyph output-beam-glyph output-beam-mid" aria-hidden="true"><svg viewBox="0 0 108 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="110" rx="25" ry="16" transform="rotate(-18 30 110)" fill="currentColor"/><rect x="53" y="28" width="7" height="78" rx="3.5" fill="currentColor"/><polygon points="8,39 95,27 95,38 8,50" fill="currentColor"/></svg></span>`,
    eighth_back: `<span class="${cls} output-note-glyph output-beam-glyph output-beam-back" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><ellipse cx="41" cy="110" rx="25" ry="16" transform="rotate(-18 41 110)" fill="currentColor"/><rect x="64" y="28" width="7" height="78" rx="3.5" fill="currentColor"/><polygon points="15,43 68,37 68,26 15,32" fill="currentColor"/></svg></span>`,
    rest_h: `<span class="${cls} output-note-glyph output-rest-glyph output-rest-half-glyph" aria-hidden="true"><svg viewBox="0 0 96 142" xmlns="http://www.w3.org/2000/svg"><rect x="16" y="50" width="64" height="6" rx="3" fill="currentColor"/><rect x="26" y="56" width="44" height="18" rx="2.5" fill="currentColor"/></svg></span>`,
    rest_q: `<span class="${cls} output-rest-glyph output-rest-quarter-glyph" aria-hidden="true">&#xE4E5;</span>`,
    rest_e: `<span class="${cls} output-rest-glyph output-rest-eighth-glyph" aria-hidden="true">&#xE4E6;</span>`
  };

  const icons = {

    // -- STANDARD NOTE GLYPHS (Bravura / SMuFL) -------------------------------
    whole: `<span class="${cls} smufl-glyph note-whole-glyph" aria-hidden="true">&#xE1D2;</span>`,

    half: `<span class="${cls} smufl-glyph note-half-glyph" aria-hidden="true">&#xE1D3;</span>`,

    dotted_half: `<span class="${cls} smufl-wrap note-dotted-half-glyph" aria-hidden="true"><span class="smufl-glyph">&#xE1D3;</span><span class="smufl-dot"></span></span>`,

    quarter: `<span class="${cls} smufl-glyph note-quarter-glyph" aria-hidden="true">&#xE1D5;</span>`,

    dotted_quarter: `<span class="${cls} smufl-wrap note-dotted-quarter-glyph" aria-hidden="true"><span class="smufl-glyph">&#xE1D5;</span><span class="smufl-dot"></span></span>`,

    eighth: `<span class="${cls} smufl-glyph note-eighth-glyph" aria-hidden="true">&#xE1D7;</span>`,

    eighth_front: `<span class="${cls} beam-glyph beam-front-glyph" aria-hidden="true"><svg viewBox="0 0 86 142" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="28" cy="96" rx="30" ry="20" transform="rotate(-18 28 96)" fill="currentColor"/>
      <rect x="52" y="4" width="7" height="94" rx="3.5" fill="currentColor"/>
      <polygon points="56,6 84,2 84,14 56,20" fill="currentColor"/>
    </svg></span>`,

    eighth_mid: `<span class="${cls} beam-glyph beam-mid-glyph" aria-hidden="true"><svg viewBox="0 0 100 142" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="34" cy="96" rx="30" ry="20" transform="rotate(-18 34 96)" fill="currentColor"/>
      <rect x="58" y="4" width="7" height="94" rx="3.5" fill="currentColor"/>
      <polygon points="8,18 94,6 94,18 8,30" fill="currentColor"/>
    </svg></span>`,

    eighth_back: `<span class="${cls} beam-glyph beam-back-glyph" aria-hidden="true"><svg viewBox="0 0 86 142" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="96" rx="30" ry="20" transform="rotate(-18 40 96)" fill="currentColor"/>
      <rect x="64" y="4" width="7" height="94" rx="3.5" fill="currentColor"/>
      <polygon points="14,24 68,18 68,6 14,12" fill="currentColor"/>
    </svg></span>`,

    rest_h: `<span class="${cls}" aria-hidden="true"><svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="18" y="28" width="84" height="5" rx="2.5" fill="currentColor"/>
      <rect x="28" y="33" width="64" height="20" rx="2" fill="currentColor"/>
    </svg></span>`,

    rest_q: `<span class="${cls} smufl-glyph rest-quarter-glyph" aria-hidden="true">&#xE4E5;</span>`,

    rest_e: `<span class="${cls} smufl-glyph rest-eighth-glyph" aria-hidden="true">&#xE4E6;</span>`

  };

  if (isCellSym && outputIcons[type]) return outputIcons[type];
  return icons[type] || `<span class="${cls}" aria-hidden="true">?</span>`;
}

function hydrateNoteButtons() {
  document.querySelectorAll('.note-btn').forEach((btn) => {
    let type = btn.getAttribute('data-type');
    if (!type) {
      const onclickValue = btn.getAttribute('onclick') || '';
      const match = onclickValue.match(/addNote\('([^']+)'/);
      if (match) type = match[1];
    }
    if (!type) return;
    const iconHTML = getNoteIconMarkup(type, 'sym');
    const meta = NOTE_META[type] || {};
    const beat = meta.beat || '';
    btn.innerHTML = iconHTML
      + (beat ? `<span class="beat-count">${beat}</span>` : '');
  });
}

/* ============================================================
   RENDER â€” build grid with tie awareness
   For 2/2: display as 4/4-feel (8 slots per bar) but keep
   time-sig logic internally unchanged.
============================================================ */
function render() {
  const ts = document.getElementById('timeSig').value;
  const total = getSlotsPerBar(ts);

  grid = [];

  notes.forEach((n, ni) => {
    const dur = getDur(n.type);
    const isTied = n.tieNext;    // this note ties INTO the next
    const prevTied = (ni > 0) && notes[ni-1].tieNext; // this note IS the continuation

    for (let j = 0; j < dur; j++) {
      const pos = grid.length % total;
      const label = getGridLabel(ts, pos);

      grid.push({
        label,
        noteIndex:    ni,
        isMain:       (j === 0),
        hasTieOut:    isTied,          // this note's cell should show tie-out mark
        isTiedCont:   prevTied         // this note is tied FROM previous
      });
    }
  });

  draw();
}

/* ============================================================
   DRAW
============================================================ */
function draw() {
  const ts    = document.getElementById('timeSig').value;
  const total = getSlotsPerBar(ts);
  const out   = document.getElementById('output');

  if (grid.length === 0) {
    out.innerHTML = `
      <div id="emptyState">
        ${getPianoIconMarkup()}
        <p>Tekan not di atas untuk mulai!</p>
      </div>`;
    return;
  }

  const activeNoteIndex = playing ? (grid[index]?.noteIndex ?? -1) : -1;

  let html = '';
  for (let i = 0; i < grid.length; i += total) {
    const barIndex = i / total;
    html += `<div class="bar" id="bar-${barIndex}">`;
    html += `<div class="bar-header">
               <div class="bar-pill">Bar ${barIndex+1}</div>
               <div class="bar-line"></div>
             </div>`;

    // Beat labels
    html += '<div class="beat-row">';
    for (let j = 0; j < total; j++) {
      const g = grid[i+j];
      html += `<div class="beat-label">${g?.isMain ? g.label : ''}</div>`;
    }
    html += '</div>';

    // Note cells
    html += '<div class="note-row">';
    for (let j = 0; j < total; j++) {
      const g = grid[i+j];
      if (g?.isMain) {
        const n   = notes[g.noteIndex];
        const sym = getNoteIconMarkup(n.type, 'cell-sym');
        const col = noteColor[n.type];
        const isActive   = (g.noteIndex === activeNoteIndex);
        const bg  = isActive ? 'var(--yellow)' : col + '30';
        const bdr = isActive ? 'var(--orange)'  : col;

        let cls = 'note-cell';
        if (isActive)       cls += ' active-cell';
        if (g.hasTieOut)    cls += ' has-tie-out';
        if (g.isTiedCont)   cls += ' is-tied-cont';

        html += `<div class="${cls}" style="background:${bg};border:2px solid ${bdr};">
                   ${sym}
                 </div>`;
      } else {
        html += '<div class="note-cell"></div>';
      }
    }
    html += '</div></div>';
  }

  out.innerHTML = html;
}

/* ============================================================
   SCROLL
============================================================ */
function scrollBarIntoView(barIndex) {
  const container = document.getElementById('outputContainer');
  const bars = document.querySelectorAll('.bar');
  const bar = bars[barIndex];
  if (!container || !bar) return;
  const maxScrollTop = Math.max(container.scrollHeight - container.clientHeight, 0);
  const targetTop = Math.min(Math.max(bar.offsetTop - 8, 0), maxScrollTop);
  container.scrollTo({
    top: targetTop,
    behavior: 'smooth'
  });
}

function scrollToLastBar() {
  const bars = document.querySelectorAll('.bar');
  if (bars.length === 0) return;
  scrollBarIntoView(bars.length - 1);
}

function scrollToActiveBar() {
  const ts    = document.getElementById('timeSig').value;
  const total = getSlotsPerBar(ts);
  const barIndex = Math.floor(index / total);
  scrollBarIntoView(barIndex);
}

/* ============================================================
   AUDIO ENGINE
   Frequencies:
     downbeat  (beat 1)          : 1500 Hz  â€” TING! highest
     strong    (beat 2,3,4)      : 900 Hz   â€” tik medium
     weak      (&)               : 550 Hz   â€” ti soft
     rest_cue                    : 2200 Hz  short blip â€” distinct from others
     go        (count-in cue)    : sweep 1200â†’1900

   Duration of click sound:
     downbeat: 0.08s  (sharp)
     strong:   0.07s
     weak:     0.05s  (very short)
     rest_cue: 0.04s  (blip)
     go:       0.15s  (slightly longer sweep)
============================================================ */
function beep(type) {
  const METRONOME_GAIN_BOOST = 1.8;

  if (type === 'bar_start') {
    const now = audioCtx.currentTime;

    const pulseA = audioCtx.createOscillator();
    const pulseAGain = audioCtx.createGain();
    pulseA.type = 'square';
    pulseA.frequency.setValueAtTime(820, now);
    pulseA.frequency.exponentialRampToValueAtTime(620, now + 0.05);
    pulseAGain.gain.setValueAtTime(Math.min(0.34 * METRONOME_GAIN_BOOST, 0.8), now);
    pulseAGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    pulseA.connect(pulseAGain);
    pulseAGain.connect(audioCtx.destination);
    pulseA.start(now);
    pulseA.stop(now + 0.05);

    const pulseB = audioCtx.createOscillator();
    const pulseBGain = audioCtx.createGain();
    pulseB.type = 'triangle';
    pulseB.frequency.setValueAtTime(2100, now + 0.045);
    pulseB.frequency.exponentialRampToValueAtTime(1350, now + 0.12);
    pulseBGain.gain.setValueAtTime(Math.min(0.42 * METRONOME_GAIN_BOOST, 0.85), now + 0.045);
    pulseBGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    pulseB.connect(pulseBGain);
    pulseBGain.connect(audioCtx.destination);
    pulseB.start(now + 0.045);
    pulseB.stop(now + 0.12);

    return;
  }

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g);
  g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  let freq = 960, dur = 0.07, gain = 0.3, endFreq = null;
  switch(type) {
    case 'downbeat':
      freq = 1350; dur = 0.08; gain = 0.42;
      break;
    case 'strong':
      freq = 960;  dur = 0.07; gain = 0.3;
      break;
    case 'weak':
      freq = 680;  dur = 0.05; gain = 0.2;
      break;
    case 'lighter':
      freq = 820;  dur = 0.05; gain = 0.26;
      break;
    case 'rest_cue':
      freq = 2200; dur = 0.035; gain = 0.18;
      o.type = 'sine';
      break;
    case 'go':
      freq = 1200; endFreq = 1900; dur = 0.15; gain = 0.35;
      break;
  }
  if (endFreq) {
    o.frequency.setValueAtTime(freq, now);
    o.frequency.linearRampToValueAtTime(endFreq, now + dur);
  } else {
    o.frequency.value = freq;
  }
  g.gain.setValueAtTime(Math.min(gain * METRONOME_GAIN_BOOST, 0.85), now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  o.start(now);
  o.stop(now + dur);
}
/* ============================================================
   COUNT-IN RULES (per spec):
   4/4 : 1 2 3 GO          â€” all 1 beat
   3/4 : 1 2 3 | 1 2 GO    â€” all 1 beat
   2/4 : 1 2 | 1 & 2 GO    â€” 1,2=1beat; 1,&,2,GO=0.5beat
   6/8 : 1 2 | 1 2 3 4 5 GO â€” 1,2=1.5beat; rest=0.5beat
   2/2 : 1 2 | 1 GO         â€” all 2 beats
============================================================ */
function countIn(cb) {
  const overlay = document.getElementById('countOverlay');
  const numEl   = document.getElementById('countNumber');
  const ts = document.getElementById('timeSig').value;
  let steps = [];
  if (ts === '4/4') {
    steps = [
      { text:'1',  dur:1,   sound:'downbeat' },
      { text:'2',  dur:1,   sound:'strong'   },
      { text:'3',  dur:1,   sound:'strong'   },
      { text:'GO', dur:1,   sound:'go'       }
    ];
  } else if (ts === '3/4') {
    steps = [
      { text:'1',  dur:1,   sound:'downbeat' },
      { text:'2',  dur:1,   sound:'strong'   },
      { text:'3',  dur:1,   sound:'strong'   },
      { text:'1',  dur:1,   sound:'downbeat' },
      { text:'2',  dur:1,   sound:'strong'   },
      { text:'GO', dur:1,   sound:'go'       }
    ];
  } else if (ts === '2/4') {
    steps = [
      { text:'1',  dur:1,   sound:'downbeat' },
      { text:'2',  dur:1,   sound:'strong'   },
      { text:'1',  dur:0.5, sound:'downbeat' },
      { text:'&',  dur:0.5, sound:'weak'     },
      { text:'2',  dur:0.5, sound:'strong'   },
      { text:'GO', dur:0.5, sound:'go'       }
    ];
  } else if (ts === '6/8') {
    steps = [
      { text:'1',  dur:1.5, sound:'downbeat' },
      { text:'2',  dur:1.5, sound:'strong'   },
      { text:'1',  dur:0.5, sound:'downbeat' },
      { text:'2',  dur:0.5, sound:'strong'   },
      { text:'3',  dur:0.5, sound:'weak'     },
      { text:'4',  dur:0.5, sound:'strong'   },
      { text:'5',  dur:0.5, sound:'weak'     },
      { text:'GO', dur:0.5, sound:'go'       }
    ];
  } else if (ts === '2/2') {
    steps = [
      { text:'1',  dur:2,   sound:'downbeat' },
      { text:'2',  dur:2,   sound:'strong'   },
      { text:'1',  dur:2,   sound:'downbeat' },
      { text:'GO', dur:2,   sound:'go'       }
    ];
  }
  let i = 0;
  overlay.style.display = 'flex';
  function step() {
    if (i >= steps.length) { overlay.style.display = 'none'; cb(); return; }
    const s = steps[i];
    numEl.innerText = s.text;
    numEl.style.animation = 'none';
    void numEl.offsetHeight;
    numEl.style.animation = '';
    beep(s.sound);
    setTimeout(step, (60/tempo) * 1000 * s.dur);
    i++;
  }
  step();
}

/* ============================================================
   PLAYBACK ENGINE
   Metronome click rules per time-sig:
   4/4 : beat 1=downbeat, beat 2/3/4=strong, &=weak
   3/4 : beat 1=downbeat, beat 2/3=strong, &=weak
   6/8 : beat 1(la/li)=downbeat/weak/weaker, beat 2(la/li)=strong/weak/weaker
   2/2 : beat 1=downbeat, beat 2=strong (based on 2/2 feel, not subdivided)
   REST notes: play rest_cue instead of normal click (on isMain only)
   TIE continuation: silence â€” NO click at all
============================================================ */
function getClickType(g) {
  // g = grid cell at current index
  const ts = document.getElementById('timeSig').value;
  const n  = notes[g.noteIndex];
  const lbl = g.label;
  if (g.isTiedCont) return null;
  const isRest = n.type.startsWith('rest_');
  if (isRest && g.isMain) return 'rest_cue';
  if (ts === '4/4') {
    if (lbl === '1')  return 'bar_start';
    if (lbl === '&')  return 'weak';
    return 'strong';
  }
  if (ts === '3/4') {
    if (lbl === '1')  return 'bar_start';
    if (lbl === '&')  return 'weak';
    return 'strong';
  }
  if (ts === '6/8') {
    if (lbl === '1')  return 'bar_start';
    if (lbl === '2')  return 'strong';
    if (lbl === 'la') return 'weak';
    if (lbl === 'li') return 'lighter';
  }
  if (ts === '2/4') {
    if (lbl === '1')  return 'bar_start';
    if (lbl === '&')  return 'weak';
    return 'strong';
  }
  if (ts === '2/2') {
    if (lbl === '1')  return 'bar_start';
    if (lbl === '3')  return 'strong';
    return null;
  }
  return 'strong';
}

function startPlayback() {
  if (grid.length === 0) { alert('Tambahkan dulu notnya ya! đźŽµ'); return; }
  document.getElementById('outputContainer').scrollTop = 0;
  audioCtx.resume();
  setTimeout(() => countIn(play), 200);
}

function play() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
  playing = true;
  index   = 0;

  function step() {
    if (!playing) return;

    const g = grid[index];

    if (g?.isMain) {
      const clickType = getClickType(g);
      if (clickType) beep(clickType);
    }

    draw();
    scrollToActiveBar();

    index++;
    if (index >= grid.length) {
      index = 0;
      document.getElementById('outputContainer').scrollTo({ top: 0, behavior: 'smooth' });
    }

    timer = setTimeout(step, (60/tempo) / 2 * 1000);
  }
  step();
}

function stop() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
  draw();
}

hydrateNoteButtons();
</script>
